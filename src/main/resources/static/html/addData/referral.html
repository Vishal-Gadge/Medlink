<!DOCTYPE html>
<html>
<head>
    <title>Create Referral</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/referral.css">
</head>
<body>

<h2>Create Referral</h2>

<form id="referralForm">
    <input type="number" placeholder="Patient ID" id="patientId"><br>
    <input type="number" placeholder="Facility ID" id="facilityId"><br>
    <input type="number" placeholder="Referring Doctor ID" id="refDrId"><br>
    <input type="number" placeholder="Receiving Doctor ID" id="recDrId"><br>
    <input type="text" placeholder="Diagnosis" id="diagnosis"><br>
    <input type="text" placeholder="Status" id="status"><br>
    <button type="submit" id="addBtn">Create Referral</button>
</form>

<div id="addRes"></div>

</div>
<script src="/js/referral.js"></script>
</body>
</html>
