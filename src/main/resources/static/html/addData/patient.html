<!DOCTYPE html>
<html>
<head>
    <title>Add Patient</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<style>
    #dateOfBirth {
        margin-top: 2px;
    }
</style>
<body class="addPatient">

<h1 class="changedColor">Add Patient</h1>

<form id="patientForm">
    <input type="text" placeholder="Username" id="username"><br>
    <p id="patientDob">Date of birth</p>
    <input type="date" placeholder="Date of Birth" id="dateOfBirth"><br>

    <label for="gender">Choose Gender:</label><br>
    <select name="gender" id="gender">
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Trans Gender">Trans Gender</option>
    </select><br>

    <input type="text" placeholder="Contact Number" id="contactNumber"><br>
    <button type="submit" id="addBtn">Add Patient</button>
</form>

<div class="res">
    
</div>

<script type="module" src="/js/patient.js"></script>
</body>
</html>
