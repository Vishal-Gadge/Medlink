<!DOCTYPE html>
<html>
<head>
    <title>Add Doctor</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="addDoctor">

<h1>Add Doctor</h1>

<form id="doctorForm">
    <input type="text" placeholder="Name" id="name"><br>
    <input type="text" placeholder="Username" id="username"><br>
    <input type="password" placeholder="Password " id="password"><br>

    <label for="role">Role</label><br>
    <select name="role" id="role">
        <option value="General Physician">General Physician</option>
        <option value="Specialist">Specialist</option>
        <option value="Surgeon">Surgeon</option>
        <option value="Consultant">Consultant</option>
        <option value="Admin Doctor">Admin Doctor</option>
    </select><br>

    <input type="number" placeholder="HealthcareCenter Id" id="healthcareCenterId"><br>
    <button type="submit" id="addBtn">Add Doctor</button>
</form>

<div id="addRes"></div>

<script type="module" src="/js/doctor.js"></script>
</body>
</html>
