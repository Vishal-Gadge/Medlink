<!DOCTYPE html>
<html>
<head>
    <title>Add Doctor</title>

    <link rel="stylesheet" href="/css/doctor.css">
</head>
<body>

<h2>Add Doctor</h2>

<form id="doctorForm">

</form>

<div id="addRes"></div>

<script src="/js/doctor.js"></script>
</body>
</html>
